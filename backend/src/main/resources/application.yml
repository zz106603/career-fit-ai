spring:
  application:
    name: career-fit-ai

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/career_fit}
    username: ${DB_USERNAME:career_fit}
    password: ${DB_PASSWORD:career_fit}
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

---
spring:
  config:
    activate:
      on-profile: test
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
